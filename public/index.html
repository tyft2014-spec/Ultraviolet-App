<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scott Unblocker | Access Everything</title>
    
    <!-- Link to Ultraviolet Scripts -->
    <script src="/uv/uv.bundle.js" defer></script>
    <script src="/uv/uv.config.js" defer></script>

    <style>
        :root {
            --primary: #ff6600; /* Scott Orange */
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --text: #ffffff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: var(--card);
            padding: 3.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid #333;
            max-width: 500px;
            width: 90%;
        }
        h1 {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            text-transform: uppercase;
        }
        h1 span {
            color: var(--primary);
        }
        p {
            opacity: 0.6;
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }
        .search-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        input {
            padding: 18px 25px;
            border-radius: 12px;
            border: 2px solid #333;
            background: #252525;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: var(--primary);
        }
        button {
            padding: 18px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 102, 0, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SCOTT<span>UNBLOCKER</span></h1>
        <p>Your web, your rules. Powered by Scott.</p>
        
        <form id="uv-form" class="search-box">
            <input id="uv-address" type="text" placeholder="Enter URL or search anything..." required>
            <button type="submit">LAUNCH</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('uv-form');
        const address = document.getElementById('uv-address');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            
            // Register the Service Worker (SW)
            // This is required for the proxy to intercept traffic
            try {
                await window.navigator.serviceWorker.register('/uv/sw.js', {
                    scope: __uv$config.prefix
                });
            } catch (err) {
                alert('Failed to register proxy engine. Ensure you are hosting on HTTPS.');
            }

            let url = address.value.trim();

            // Simple search logic: if it's not a URL, search Google
            if (!url.includes('.') && !url.startsWith('http')) {
                url = 'https://www.google.com' + encodeURIComponent(url);
            } else if (!url.startsWith('http')) {
                url = 'https://' + url;
            }

            // Redirect to the proxied URL using the UV config
            window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
        });
    </script>

</body>
</html>
